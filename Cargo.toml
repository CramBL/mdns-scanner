[package]
name = "mdns-scanner"
description = "Scan a network and create a list of IPs and associated hostnames, including mDNS hostnames and other aliases."
license = "MIT OR Apache-2.0"
authors = ["Marc Beck König <mgit@tuta.io>"]
version = "0.1.0"
edition = "2024"
readme = "README.md"
homepage = "https://github.com/CramBL/mdns-scanner"
repository = "https://github.com/CramBL/mdns-scanner"
exclude = [".github", "scripts"]
keywords = ["tui", "command-line", "network"]
rust-version = "1.85.1"

[dependencies]
chrono = "0.4.40"
color-eyre = "0.6.3"
crossterm = "0.29.0"
dns-lookup = "2.0.4"
dns-parser = "0.8.0"
get_if_addrs = "0.5.3"
pnet = "0.35.0"
ratatui = "0.29.0"
ringbuffer = "0.15.0"
socket2 = "0.5.9"
strum = "0.27.1"
strum_macros = "0.27.1"
threadpool = "1.8.1"
unicode-width = "0.2.0"

[profile.release]
opt-level = 3
debug = false
panic = "abort"
strip = true
lto = true
codegen-units = 1
