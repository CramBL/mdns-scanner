name: CI

on:
    workflow_dispatch:
    pull_request:
    push:
        branches: [trunk]
        tags:
          - '*'
defaults:
    run:
        shell: bash

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always
  NPCAP_VER: 1.15

jobs:
    test:
      strategy:
        matrix:
          os:
            - ubuntu-latest
            - macos-latest
            - windows-latest
        fail-fast: false

      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
        - uses: taiki-e/install-action@nextest
        - uses: Swatinem/rust-cache@v2

        - name: Setup Npcap
          if: ${{ matrix.os == 'windows-latest' }}
          uses: ./.github/actions/setup-npcap
          with:
            npcap-version: ${{ env.NPCAP_VER }}

        - name: Test ${{ matrix.os }}
          run: cargo nextest run

    coverage:
    # use llvm-cov to build and collect coverage and outputs in a format that
    # is compatible with codecov.io
      runs-on: ubuntu-latest
      name: ubuntu / stable / coverage
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: llvm-tools-preview

        - name: cargo install cargo-llvm-cov
          uses: taiki-e/install-action@cargo-llvm-cov
        - uses: Swatinem/rust-cache@v2

        - name: cargo llvm-cov
          run: cargo llvm-cov --locked --all-features --lcov --output-path lcov.info

        - name: Record Rust version
          run: echo "RUST=$(rustc --version)" >> "$GITHUB_ENV"

        - name: Upload to codecov.io
          uses: codecov/codecov-action@v5
          with:
            fail_ci_if_error: true
            token: ${{ secrets.CODECOV_TOKEN }}
            env_vars: OS,RUST

    lint:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
        - uses: Swatinem/rust-cache@v2

        - name: Clippy
          run: cargo clippy --all-targets

        - name: Format
          run: cargo fmt --all -- --check

    typos:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Check spelling of entire workspace
          uses: crate-ci/typos@v1.32.0

    prerelease:
        runs-on: ubuntu-latest

        outputs:
            value: ${{ steps.prerelease.outputs.value }}
        steps:
            - name: Prerelease Check
              id: prerelease
              run: |
                if [[ ${{ github.ref_name }} =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                    echo value=false >> $GITHUB_OUTPUT
                else
                    echo value=true >> $GITHUB_OUTPUT
                fi

    build-package:
        needs:
            - prerelease
        permissions:
            contents: write
        strategy:
            matrix:
                target:
                    - aarch64-apple-darwin
                    - aarch64-unknown-linux-musl
                    - arm-unknown-linux-musleabihf
                    - armv7-unknown-linux-musleabihf
                    - x86_64-apple-darwin
                    - x86_64-pc-windows-msvc
                    # It might be possible to support this by excluding npcap for this target specifically
                    # - aarch64-pc-windows-msvc
                    - x86_64-unknown-linux-musl
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      target_rustflags: ''
                    - target: aarch64-unknown-linux-musl
                      os: ubuntu-latest
                      target_rustflags: '--codegen linker=aarch64-linux-gnu-gcc'
                    - target: arm-unknown-linux-musleabihf
                      os: ubuntu-latest
                      target_rustflags: '--codegen linker=arm-linux-gnueabihf-gcc'
                    - target: armv7-unknown-linux-musleabihf
                      os: ubuntu-latest
                      target_rustflags: '--codegen linker=arm-linux-gnueabihf-gcc'
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      target_rustflags: ''
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                    # - target: aarch64-pc-windows-msvc
                    #   os: windows-latest
                    #   target_rustflags: ''
                    - target: x86_64-unknown-linux-musl
                      os: ubuntu-latest
                      target_rustflags: ''

        runs-on: ${{matrix.os}}

        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                targets: ${{ matrix.target }}

            - name: Install AArch64 Toolchain
              if: ${{ matrix.target == 'aarch64-unknown-linux-musl' }}
              run: |
                sudo apt-get update
                sudo apt-get install gcc-aarch64-linux-gnu libc6-dev-i386

            - name: Install ARM Toolchain
              if: ${{ matrix.target == 'arm-unknown-linux-musleabihf' || matrix.target == 'armv7-unknown-linux-musleabihf' }}
              run: |
                sudo apt-get update
                sudo apt-get install gcc-arm-linux-gnueabihf

            - name: Setup Npcap
              if: ${{ matrix.target == 'aarch64-pc-windows-msvc' || matrix.target == 'x86_64-pc-windows-msvc' }}
              uses: ./.github/actions/setup-npcap
              with:
                npcap-version: ${{ env.NPCAP_VER }}

            - uses: Swatinem/rust-cache@v2
              with:
                key: ${{ matrix.target }}

            - name: Package
              id: package
              env:
                  TARGET: ${{ matrix.target }}
                  REF: ${{ github.ref }}
                  OS: ${{ matrix.os }}
                  TARGET_RUSTFLAGS: ${{ matrix.target_rustflags }}
              run: |
                export TARGET_RUSTFLAGS="${RUSTFLAGS} ${{ env.TARGET_RUSTFLAGS }}"
                ./scripts/package.bash

            - name: Publish Archive
              uses: softprops/action-gh-release@v2.2.1
              if: ${{ startsWith(github.ref, 'refs/heads/trunk') || startsWith(github.ref, 'refs/tags/') }}
              with:
                draft: ${{ startsWith(github.ref, 'refs/heads/trunk') }}
                files: ${{ steps.package.outputs.archive }}
                prerelease: ${{ needs.prerelease.outputs.value }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish Changelog
              uses: softprops/action-gh-release@v2.2.1
              if: >-
                ${{
                    startsWith(github.ref, 'refs/tags/')
                    && matrix.target == 'x86_64-unknown-linux-musl'
                }}
              with:
                draft: false
                files: CHANGELOG.md
                prerelease: ${{ needs.prerelease.outputs.value }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release-crates-io:
      needs: build-package
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Publish
          run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

    tag-release:
      needs:
        - lint
        - build-package
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/trunk'
      permissions:
          contents: write # This is required to create and push tags

      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
            token: ${{ secrets.MDNS_SCANNER_WITH_REPO_SCOPE }}

        - name: Get version from Cargo.toml
          id: get_version
          run: |
            VERSION=$(grep '^version = ' Cargo.toml | cut -d '"' -f 2)
            echo "VERSION=$VERSION" >> $GITHUB_ENV

        - name: Check if tag exists
          id: check_tag
          run: |
            if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
              echo "Tag already exists"
              echo "TAG_EXISTS=true" >> $GITHUB_ENV
            else
              echo "Tag does not exist"
              echo "TAG_EXISTS=false" >> $GITHUB_ENV
            fi

        - name: Create and push tag
          if: env.TAG_EXISTS == 'false'
          run: |
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
