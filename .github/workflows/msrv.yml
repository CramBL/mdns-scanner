name: Minimum Support Rust Version

on:
    workflow_dispatch:
    pull_request:
    push:
        branches: [trunk]

jobs:
    msrv:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: taiki-e/install-action@cargo-hack
        - run: cargo hack check --rust-version --workspace --all-targets --ignore-private
