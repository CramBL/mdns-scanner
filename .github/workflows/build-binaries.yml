# Build mdns-scanner on all platforms.
#
# Generates archived binaries for GitHub releases.
#
# Assumed to run as a subworkflow of .github/workflows/release.yml; specifically, as a local
# artifacts job within `cargo-dist`.
name: "Build release binaries"

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BINARY_NAME: mdns-scanner
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10
  RUST_VERSION: 1.87

jobs:
  macos:
    name: macos (${{ matrix.target }})
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
        - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        - uses: dtolnay/rust-toolchain@master
          with:
            toolchain: ${{ env.RUST_VERSION }}
            targets: ${{ matrix.target }}

        - name: "Build ${{ matrix.target }}"
          run: |
            cargo build --release --locked --target ${{ matrix.target }}

        - name: "Test binary"
          if: ${{ matrix.target == 'aarch64-apple-darwin' }}
          run: |
            ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} --help

        - name: "Archive binary"
          run: |
            ARCHIVE_DIR=${{ env.BINARY_NAME }}-${{ matrix.target }}
            mkdir -p "$ARCHIVE_DIR"

            cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$ARCHIVE_DIR/"

            ARCHIVE_FILE="$ARCHIVE_DIR.tar.gz"
            tar -czf "$ARCHIVE_FILE" "$ARCHIVE_DIR"
            shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256

        - name: "Upload binary"
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
          with:
            name: artifacts-${{ matrix.target }}
            path: |
              *.tar.gz
              *.sha256

  windows:
    name: windows (${{ matrix.target }})
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: list dir
        shell: bash
        run: ls -lR target

      - name: check exe
        shell: bash
        run: |
          ls -l target/${{ matrix.target }}/release/
          ls -l target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe

      - name: check exe pwsh
        run: |
          ls target/${{ matrix.target }}/release/
          ls target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe

      - name: Test ${{ matrix.target }}
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' }}
        run: ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe --help

      - name: "Archive ${{ matrix.target }}"
        shell: bash
        run: |
          ARCHIVE_FILE=${{ env.BINARY_NAME }}-${{ matrix.target }}.zip
          7z a $ARCHIVE_FILE ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe
          sha256sum $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.zip
            *.sha256

  linux:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - { target: "i686-unknown-linux-gnu" }
          - { target: "x86_64-unknown-linux-gnu" }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib
          rustup target add ${{ matrix.target }}
      - name: "Build binary"
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
      - name: "Test binary"
        if: ${{ startsWith(matrix.target, 'x86_64') }}
        run: |
          ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-arm:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            glibc: '.2.28'
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7
            glibc: '.2.17'
          - target: arm-unknown-linux-musleabihf
            arch: arm

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
          rustup target add ${{ matrix.platform.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: cargo zigbuild --release --locked --target ${{ matrix.platform.target }}${{matrix.platform.glibc}}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
      - uses: uraimo/run-on-arch-action@d94c13912ea685de38fccc1109385b83fd79427d # v3.0.1
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch == 'arm' && 'armv6' || matrix.platform.arch }}
          distro: ${{ matrix.platform.arch == 'arm' && 'bullseye' || 'ubuntu20.04' }}
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-s390x:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: s390x-unknown-linux-gnu
            arch: s390x

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-s390x-linux-gnu
          rustup target add ${{ matrix.platform.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: |
          cargo zigbuild --release --locked --target ${{ matrix.platform.target }}.2.17
        env:
          CARGO_TARGET_S390X_UNKNOWN_LINUX_GNU_LINKER: s390x-linux-gnu-gcc
      - uses: uraimo/run-on-arch-action@d94c13912ea685de38fccc1109385b83fd79427d # v3.0.1
        if: matrix.platform.arch != 'ppc64'
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch }}
          distro: ubuntu20.04
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-powerpc:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: powerpc64le-unknown-linux-gnu
            arch: ppc64le
          - target: powerpc64-unknown-linux-gnu
            arch: ppc64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-powerpc64le-linux-gnu gcc-powerpc64-linux-gnu
          rustup target add ${{ matrix.platform.target }}
      - name: "Build binary"
        run: |
          cargo build --release --locked --target ${{ matrix.platform.target }}
        env:
          CARGO_TARGET_POWERPC64LE_UNKNOWN_LINUX_GNU_LINKER: powerpc64le-linux-gnu-gcc
          CARGO_TARGET_POWERPC64_UNKNOWN_LINUX_GNU_LINKER: powerpc64-linux-gnu-gcc
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-riscv64:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: riscv64gc-unknown-linux-musl
            arch: riscv64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu
          rustup target add ${{ matrix.platform.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: cargo zigbuild --release --locked --target ${{ matrix.platform.target }}
        env:
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_MUSL_LINKER: riscv64-linux-gnu-gcc
      - uses: uraimo/run-on-arch-action@ac33288c3728ca72563c97b8b88dda5a65a84448 # v2
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch }}
          distro: ubuntu20.04
          githubToken: ${{ github.token }}
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  musllinux:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: "Install musl tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          rustup target add ${{ matrix.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: "Test binary"
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  musllinux-cross:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-musl
            arch: aarch64
          - target: armv7-unknown-linux-musleabihf
            arch: armv7
      fail-fast: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
          rustup target add ${{ matrix.platform.target }}
      - name: "Build binary"
        run: |
          cargo build --release --locked --target ${{ matrix.platform.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: arm-linux-gnueabihf-gcc
      - uses: uraimo/run-on-arch-action@d94c13912ea685de38fccc1109385b83fd79427d # v3.0.1
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch }}
          distro: alpine_latest
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256
