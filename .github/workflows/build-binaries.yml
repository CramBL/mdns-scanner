# Build mdns-scanner on all platforms.
#
# Generates archived binaries for GitHub releases.
#
# Assumed to run as a subworkflow of .github/workflows/release.yml; specifically, as a local
# artifacts job within `cargo-dist`.
name: "Build release binaries"

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BINARY_NAME: mdns-scanner
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10
  RUST_VERSION: 1.93

jobs:
  macos:
    name: macos (${{ matrix.target }})
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install toolchain for ${{ matrix.target }}
        run: rustup target add ${{ matrix.target }}

      - name: "Build ${{ matrix.target }}"
        run: |
          cargo build --release --locked --target ${{ matrix.target }} --features dist

      - name: "Test binary"
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        run: |
          ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} --help

      - name: "Archive binary"
        run: |
          ARCHIVE_DIR=${{ env.BINARY_NAME }}-${{ matrix.target }}
          mkdir -p "$ARCHIVE_DIR"

          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$ARCHIVE_DIR/"

          ARCHIVE_FILE="$ARCHIVE_DIR.tar.gz"
          tar -czf "$ARCHIVE_FILE" "$ARCHIVE_DIR"
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  windows:
    name: windows (${{ matrix.target }})
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install toolchain for ${{ matrix.target }}
        run: rustup target add ${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        run: cargo build --release --locked --target ${{ matrix.target }} --features dist

      - name: "Archive ${{ matrix.target }}"
        shell: bash
        run: |
          ARCHIVE_FILE=${{ env.BINARY_NAME }}-${{ matrix.target }}.zip
          7z a $ARCHIVE_FILE ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe
          sha256sum $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.zip
            *.sha256

  linux-s390x:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: s390x-unknown-linux-gnu
            arch: s390x

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-s390x-linux-gnu
          rustup target add ${{ matrix.platform.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: |
          cargo zigbuild --release --locked --target ${{ matrix.platform.target }}.2.17 --features dist
        env:
          CARGO_TARGET_S390X_UNKNOWN_LINUX_GNU_LINKER: s390x-linux-gnu-gcc
      - uses: uraimo/run-on-arch-action@aa8e672a03e10b403401927ea2ceda57e1b68ac3 # v3
        if: matrix.platform.arch != 'ppc64'
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch }}
          distro: ubuntu22.04
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-powerpc:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: powerpc64le-unknown-linux-gnu
            arch: ppc64le
          - target: powerpc64-unknown-linux-gnu
            arch: ppc64

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-powerpc64le-linux-gnu gcc-powerpc64-linux-gnu
          rustup target add ${{ matrix.platform.target }}
      - name: "Build binary"
        run: |
          cargo build --release --locked --target ${{ matrix.platform.target }} --features dist
        env:
          CARGO_TARGET_POWERPC64LE_UNKNOWN_LINUX_GNU_LINKER: powerpc64le-linux-gnu-gcc
          CARGO_TARGET_POWERPC64_UNKNOWN_LINUX_GNU_LINKER: powerpc64-linux-gnu-gcc
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-riscv64:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: riscv64gc-unknown-linux-musl
            arch: riscv64

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: "Install cross-compilation tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu
          rustup target add ${{ matrix.platform.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: cargo zigbuild --release --locked --target ${{ matrix.platform.target }} --features dist
      - uses: uraimo/run-on-arch-action@aa8e672a03e10b403401927ea2ceda57e1b68ac3 # v3
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch }}
          distro: ubuntu20.04
          githubToken: ${{ github.token }}
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256

  musllinux:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: "Install musl tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          rustup target add ${{ matrix.target }}
          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            if ! command -v pip3 > /dev/null 2>&1; then
              dnf install --assumeyes python3-pip
              pip3 install --upgrade pip
            fi
            pip3 install cargo-zigbuild
          fi
      - name: "Build binary"
        run: cargo zigbuild --release --locked --target ${{ matrix.target }} --features dist

      - name: "Test binary"
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  linux-arm:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-musl
            arch: aarch64
          - target: armv7-unknown-linux-musleabihf
            arch: armv7
          - target: arm-unknown-linux-musleabihf
            arch: arm
      fail-fast: false

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: "Install cross"
        run: |
          cargo install cross \
            --git https://github.com/cross-rs/cross \
            --rev 588b3c99db52b5a9c5906fab96cfadcf1bde7863

      - name: "Build binary"
        run: cross build --release --locked --target ${{ matrix.platform.target }} --features dist
      - uses: uraimo/run-on-arch-action@aa8e672a03e10b403401927ea2ceda57e1b68ac3 # v3
        name: "Test binary"
        with:
          arch: ${{ matrix.platform.arch == 'arm' && 'armv6' || matrix.platform.arch }}
          distro: alpine_latest
          run: |
            ./target/${{ matrix.platform.target }}/release/${{ env.BINARY_NAME }} --help
      - name: "Archive binary"
        shell: bash
        run: |
          TARGET=${{ matrix.platform.target }}
          ARCHIVE_NAME=${{ env.BINARY_NAME }}-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/${{ env.BINARY_NAME }} $ARCHIVE_NAME/${{ env.BINARY_NAME }}
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
      - name: "Upload binary"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: artifacts-${{ matrix.platform.target }}
          path: |
            *.tar.gz
            *.sha256
